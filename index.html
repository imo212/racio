<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title></title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#005bff">

<style>
:root{
  --bg:#ffffff;
  --text:#000000;
  --accent:#005bff;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--bg);
  color:var(--text);
}

.container{
  max-width:560px;
  margin:0 auto;
  padding:20px 16px;
}

/* 日付 */
.header-date{
  font-size:12px;
  letter-spacing:1px;
  margin-bottom:16px;
}

/* 進捗（主役） */
.progress{
  margin-bottom:24px;
  border-top:3px solid var(--text);
  padding-top:12px;
}

.progress-num{
  font-size:56px;
  font-weight:800;
  letter-spacing:4px;
}

.progress-sub{
  font-size:12px;
}

/* 習慣 */
.habit{
  display:flex;
  align-items:center;
  padding:16px 0;
  border-bottom:1px solid #000;
  cursor:pointer;
}

.habit:active{
  transform:translateX(4px);
}

.habit-left{
  width:6px;
  height:24px;
  margin-right:12px;
  background:#000;
}

.habit.done .habit-left{
  background:var(--accent);
}

.habit-content{
  flex:1;
}

.habit-name{
  font-size:16px;
  font-weight:600;
}

.habit-time{
  font-size:11px;
  margin-top:2px;
}

.habit.done .habit-name{
  color:var(--accent);
}

</style>
</head>

<body>

<div class="container">

  <div class="header-date" id="today"></div>

  <div class="progress">
    <div class="progress-num" id="progressNum">00</div>
    <div class="progress-sub">COMPLETED</div>
  </div>

  <div id="habitList"></div>

</div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

function requestNotificationPermission() {
  if ("Notification" in window) {
    Notification.requestPermission();
  }
}

function scheduleNotification(hour, minute, message) {
  const now = new Date();
  const target = new Date();

  target.setHours(hour);
  target.setMinutes(minute);
  target.setSeconds(0);

  if (target < now) {
    target.setDate(target.getDate() + 1);
  }

  const timeout = target - now;

  setTimeout(() => {
    new Notification(message);
    scheduleNotification(hour, minute, message);
  }, timeout);
}

const habits = [
  { name: "水を飲む", time: "MORNING" },
  { name: "ストレッチ", time: "NIGHT" }
];

let done = {};

function render(){
  const list = document.getElementById("habitList");
  list.innerHTML = "";

  let completed = 0;

  habits.forEach((h,i)=>{
    const isDone = done[i];
    if(isDone) completed++;

    const el = document.createElement("div");
    el.className = "habit" + (isDone ? " done" : "");

    el.onclick = ()=>{
      done[i] = !done[i];
      render();
    };

    el.innerHTML = `
      <div class="habit-left"></div>
      <div class="habit-content">
        <div class="habit-name">${h.name}</div>
        <div class="habit-time">${h.time}</div>
      </div>
    `;

    list.appendChild(el);
  });

  document.getElementById("progressNum").textContent = String(completed).padStart(2,'0');
}

function setToday(){
  const d = new Date();
  document.getElementById("today").textContent = d.toLocaleDateString();
}

window.onload = () => {
  setToday();
  render();
  requestNotificationPermission();
  scheduleNotification(21, 0, "習慣やる時間だよ");
};
</script>

</body>
</html>
