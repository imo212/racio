<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ラキオの習慣トラッカー</title>
<style>
:root{
  --bg:#ffffff;
  --text:#000000;
  --accent:#005bff;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

.wave{
  position:fixed;
  top:-50%;
  left:-50%;
  width:200%;
  height:200%;
  background:
    radial-gradient(circle at 30% 30%, rgba(0,91,255,0.18), transparent 60%),
    radial-gradient(circle at 70% 60%, rgba(0,91,255,0.08), transparent 60%);
  animation:waveMove 8s ease-in-out infinite alternate;
  pointer-events:none;
}

@keyframes waveMove{
  0%{
    transform:translate(0,0) scale(1);
  }
  100%{
    transform:translate(8%, 6%) scale(1.1);
  }
}

.container{
  position:relative;
  max-width:560px;
  margin:0 auto;
  padding:20px 16px;
}

.header-date{
  font-size:14px;
  letter-spacing:2px;
  margin-bottom:20px;
  border-left:4px solid var(--accent);
  padding-left:8px;
}

.racio-message-box{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:16px;
  padding:12px;
  background:rgba(0,91,255,0.02);
  border-radius:8px;
}

.racio-icon{
  width:40px;
  height:40px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid var(--accent);
  flex-shrink:0;
}

.racio-message{
  font-size:12px;
  line-height:1.5;
  color:#666;
  flex:1;
}

.diagonal{
  height:2px;
  background:linear-gradient(135deg, black 40%, transparent 40%);
  margin:16px 0;
}

.progress{
  margin-bottom:8px;
}

.progress-num{
  font-size:64px;
  font-weight:900;
  letter-spacing:6px;
}

.streak{
  font-size:12px;
  margin-bottom:8px;
}

.calendar{
  display:grid;
  grid-template-columns:repeat(14, 1fr);
  gap:2px;
  margin-bottom:16px;
}

.cal-day{
  aspect-ratio:1;
  background:#f0f0f0;
  border-radius:2px;
}

.cal-day.done{
  background:var(--accent);
}

.cal-day.today{
  border:1px solid var(--accent);
}

.habit{
  display:flex;
  align-items:center;
  padding:16px 0;
  border-bottom:1px solid #000;
  cursor:pointer;
  position:relative;
  overflow:hidden;
}

.habit.flash::after{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(90deg, transparent, rgba(0,91,255,0.4), transparent);
  animation:flash 0.4s ease;
}

@keyframes flash{
  0%{left:-100%}
  100%{left:100%}
}

.habit:active{
  transform:translateX(4px);
}

.habit-left{
  width:6px;
  height:24px;
  margin-right:12px;
  background:#000;
}

.habit.done .habit-left{
  background:var(--accent);
}

.habit-content{flex:1}

.habit-name{
  font-size:16px;
  font-weight:600;
}

.habit-time{
  font-size:11px;
}

.habit.done .habit-name{
  color:var(--accent);
}

.edit-btn{
  margin-top:20px;
  font-size:12px;
  opacity:0.6;
  cursor:pointer;
}

.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  right:0;
  bottom:0;
  background:rgba(0,0,0,0.5);
  z-index:1000;
}

.modal.show{
  display:flex;
  align-items:center;
  justify-content:center;
}

.modal-content{
  background:white;
  border-radius:16px;
  padding:1.5rem;
  max-width:90%;
  width:400px;
  max-height:80vh;
  overflow-y:auto;
}

.modal-title{
  font-size:18px;
  font-weight:600;
  margin-bottom:1rem;
}

.habit-edit-item{
  margin-bottom:1rem;
  padding-bottom:1rem;
  border-bottom:1px solid #eee;
}

.input-label{
  font-size:13px;
  color:#666;
  margin-bottom:4px;
  display:block;
}

.input-field{
  width:100%;
  padding:8px 12px;
  border:1px solid #ddd;
  border-radius:8px;
  font-size:14px;
}

.btn-group{
  display:flex;
  gap:8px;
  margin-top:1rem;
}

.btn{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  font-size:14px;
  font-weight:500;
  cursor:pointer;
}

.btn-primary{
  background:var(--accent);
  color:white;
}

.btn-secondary{
  background:#e0e0e0;
  color:#333;
}
</style>
</head>
<body>

<div class="wave"></div>

<div class="container">

  <div class="header-date" id="today"></div>

  <div class="racio-message-box">
    <img id="racioIcon" class="racio-icon" src="" alt="">
    <div class="racio-message" id="racioMessage"></div>
  </div>

  <div class="progress">
    <div class="progress-num" id="progressNum">00</div>
  </div>

  <div class="streak" id="streak">00 DAYS</div>

  <div class="calendar" id="calendar"></div>

  <div class="diagonal"></div>

  <div id="habitList"></div>

  <div class="edit-btn" onclick="openEditModal()">EDIT</div>

</div>

<div class="modal" id="editModal">
  <div class="modal-content">
    <div class="modal-title">習慣の編集</div>
    <div id="editList"></div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="saveHabits()">保存</button>
      <button class="btn btn-secondary" onclick="closeEditModal()">キャンセル</button>
    </div>
  </div>
</div>

const MESSAGES = {"low": ["フム……まずは一歩だね", "フン、まぁやらないよりはマシなンじゃない?", "……で? 残りはどうするンだい?"], "mid": ["へぇ、なかなか君は悪くない", "半分か。悪くないンじゃない?", "フム、君にしてはよくやってる方さ"], "high": ["へぇ、凡愚にしては頑張ったンじゃない?", "完璧じゃないか。君も少しは見直したよ", "ははっ、やればできるンだね"], "streak": ["{streak}日連続——なかなかやるじゃないか", "連続記録更新だ。素直に褒めてやるよ", "{streak}日連続。この調子で行けばいいンじゃない?"], "fail": ["知ってたかい? 僕は君を信用してたンだ", "途切れたか。まぁ、予想通りさ", "途切れたね。まぁ、また始めればいいンじゃない?"]};

const DEFAULT_HABITS = [
  { id: 'anki', name: 'Anki 3分', time: '18:05' },
  { id: 'workout', name: '筋トレ 5分', time: '18:55' },
  { id: 'stretch', name: 'ストレッチ 3分', time: '19:30' },
  { id: 'breakfast', name: '朝ごはん記録', time: '7:00' },
  { id: 'sleep', name: '23時就寝', time: '23:00' }
];

function getToday() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function loadData() {
  const data = localStorage.getItem('racioData');
  return data ? JSON.parse(data) : {};
}

function saveData(data) {
  localStorage.setItem('racioData', JSON.stringify(data));
}

function loadHabits() {
  const habits = localStorage.getItem('racioHabits');
  return habits ? JSON.parse(habits) : DEFAULT_HABITS;
}

function saveHabitsConfig(habits) {
  localStorage.setItem('racioHabits', JSON.stringify(habits));
}

function toggleHabit(habitId) {
  const data = loadData();
  const today = getToday();
  
  if (!data[today]) data[today] = {};
  data[today][habitId] = !data[today][habitId];
  
  saveData(data);
  render();
}

function getRandomItem(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function calculateStreak() {
  const data = loadData();
  const habits = loadHabits();
  const today = new Date();
  let streak = 0;
  
  for (let i = 0; i < 365; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    
    const dayData = data[dateStr];
    if (!dayData) break;
    
    const done = Object.values(dayData).filter(v => v).length;
    const total = habits.length;
    
    if (done >= Math.ceil(total * 0.8)) {
      streak++;
    } else {
      break;
    }
  }
  
  return streak;
}

function wasStreakBroken() {
  const data = loadData();
  const habits = loadHabits();
  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  const yesterdayStr = `${yesterday.getFullYear()}-${String(yesterday.getMonth()+1).padStart(2,'0')}-${String(yesterday.getDate()).padStart(2,'0')}`;
  
  const yesterdayData = data[yesterdayStr];
  if (!yesterdayData) return false;
  
  const done = Object.values(yesterdayData).filter(v => v).length;
  const total = habits.length;
  
  const twoDaysAgo = new Date();
  twoDaysAgo.setDate(twoDaysAgo.getDate() - 2);
  const twoDaysAgoStr = `${twoDaysAgo.getFullYear()}-${String(twoDaysAgo.getMonth()+1).padStart(2,'0')}-${String(twoDaysAgo.getDate()).padStart(2,'0')}`;
  const twoDaysAgoData = data[twoDaysAgoStr];
  
  if (twoDaysAgoData) {
    const prevDone = Object.values(twoDaysAgoData).filter(v => v).length;
    if (prevDone >= Math.ceil(total * 0.8) && done < Math.ceil(total * 0.8)) {
      return true;
    }
  }
  
  return false;
}

function render() {
  const data = loadData();
  const habits = loadHabits();
  const today = getToday();
  const todayData = data[today] || {};
  const streak = calculateStreak();
  const broken = wasStreakBroken();
  
  const d = new Date();
  const day = d.toLocaleDateString('en-US', {weekday:'short'}).toUpperCase();
  const date = d.toLocaleDateString('en-US', {month:'2-digit', day:'2-digit'});
  document.getElementById('today').textContent = `${day} / ${date}`;
  
  const list = document.getElementById('habitList');
  list.innerHTML = '';
  
  const sorted = habits.map((h,i)=>({h,i})).sort((a,b)=>{
    return (todayData[habits[a.i].id]?1:0)-(todayData[habits[b.i].id]?1:0);
  });
  
  sorted.forEach(({h,i}))=>{
    const isDone = todayData[h.id];
    
    const el = document.createElement('div');
    el.className = 'habit' + (isDone ? ' done' : '');
    
    el.onclick = () => {
      toggleHabit(h.id);
      el.classList.add('flash');
      setTimeout(()=>el.classList.remove('flash'),400);
    };
    
    el.innerHTML = `
      <div class="habit-left"></div>
      <div class="habit-content">
        <div class="habit-name">${h.name}</div>
        <div class="habit-time">${h.time}</div>
      </div>
    `;
    
    list.appendChild(el);
  });
  
  const todayDone = Object.values(todayData).filter(v => v).length;
  const total = habits.length;
  
  document.getElementById('progressNum').textContent = String(todayDone).padStart(2,'0');
  document.getElementById('streak').textContent = `${String(streak).padStart(2,'0')} DAYS`;
  
  let category, message, image;
  
  if (broken) {
    category = 'fail';
    message = getRandomItem(MESSAGES.fail);
    image = IMAGES.fail;
  } else if (streak > 0 && todayDone === total) {
    category = 'streak';
    message = getRandomItem(MESSAGES.streak).replace('{streak}', streak);
    image = IMAGES.streak;
  } else if (todayDone === 0) {
    message = '';
    image = IMAGES.low;
  } else if (todayDone === total) {
    category = 'high';
    message = getRandomItem(MESSAGES.high);
    image = IMAGES.high;
  } else if (todayDone >= Math.ceil(total / 2)) {
    category = 'mid';
    message = getRandomItem(MESSAGES.mid);
    image = IMAGES.mid;
  } else {
    category = 'low';
    message = getRandomItem(MESSAGES.low);
    image = IMAGES.low;
  }
  
  document.getElementById('racioMessage').textContent = message;
  document.getElementById('racioIcon').src = 'data:image/jpeg;base64,' + image;
  
  // カレンダー
  const calendar = document.getElementById('calendar');
  calendar.innerHTML = '';
  for (let i = 13; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const dayData = data[dateStr];
    const done = dayData ? Object.values(dayData).filter(v => v).length : 0;
    const isToday = dateStr === today;
    const isDone = done >= Math.ceil(total * 0.8);
    
    const div = document.createElement('div');
    div.className = `cal-day ${isDone ? 'done' : ''} ${isToday ? 'today' : ''}`;
    calendar.appendChild(div);
  }
}

function openEditModal() {
  const habits = loadHabits();
  const editList = document.getElementById('editList');
  
  editList.innerHTML = habits.map((h, i) => `
    <div class="habit-edit-item">
      <label class="input-label">習慣名</label>
      <input class="input-field" type="text" id="name_${i}" value="${h.name}">
      <label class="input-label" style="margin-top: 8px;">時刻</label>
      <input class="input-field" type="time" id="time_${i}" value="${h.time}">
    </div>
  `).join('');
  
  document.getElementById('editModal').classList.add('show');
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('show');
}

function saveHabits() {
  const habits = loadHabits();
  const updated = habits.map((h, i) => ({
    id: h.id,
    name: document.getElementById(`name_${i}`).value,
    time: document.getElementById(`time_${i}`).value
  }));
  
  saveHabitsConfig(updated);
  closeEditModal();
  render();
}

render();
</script>
