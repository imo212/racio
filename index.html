<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title></title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#005bff">

<style>
:root{
  --bg:#ffffff;
  --text:#000000;
  --accent:#005bff;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

.wave{
  position:fixed;
  top:0;
  left:0;
  width:200%;
  height:200%;
  background:radial-gradient(circle at 30% 30%, rgba(0,91,255,0.08), transparent 60%);
  animation:waveMove 12s linear infinite;
  pointer-events:none;
}

@keyframes waveMove{
  0%{transform:translate(0,0)}
  50%{transform:translate(-10%, -5%)}
  100%{transform:translate(0,0)}
}

.container{
  position:relative;
  max-width:560px;
  margin:0 auto;
  padding:20px 16px;
}

.header-date{
  font-size:14px;
  letter-spacing:2px;
  margin-bottom:20px;
  border-left:4px solid var(--accent);
  padding-left:8px;
}

.diagonal{
  height:2px;
  background:linear-gradient(135deg, black 40%, transparent 40%);
  margin:16px 0;
}

.progress{
  margin-bottom:8px;
}

.progress-num{
  font-size:64px;
  font-weight:900;
  letter-spacing:6px;
}

.streak{
  font-size:12px;
  margin-bottom:16px;
}

.habit{
  display:flex;
  align-items:center;
  padding:16px 0;
  border-bottom:1px solid #000;
  cursor:pointer;
  position:relative;
  overflow:hidden;
}

/* 達成フラッシュ */
.habit.flash::after{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(90deg, transparent, rgba(0,91,255,0.4), transparent);
  animation:flash 0.4s ease;
}

@keyframes flash{
  0%{left:-100%}
  100%{left:100%}
}

.habit:active{
  transform:translateX(4px);
}

.habit-left{
  width:6px;
  height:24px;
  margin-right:12px;
  background:#000;
}

.habit.done .habit-left{
  background:var(--accent);
}

.habit-content{flex:1}

.habit-name{
  font-size:16px;
  font-weight:600;
}

.habit-time{
  font-size:11px;
}

.habit.done .habit-name{
  color:var(--accent);
}

.add-btn{
  margin-top:20px;
  font-size:12px;
  opacity:0.6;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="wave"></div>

<div class="container">

  <div class="header-date" id="today"></div>

  <div class="progress">
    <div class="progress-num" id="progressNum">00</div>
  </div>

  <div class="streak" id="streak">00 DAYS</div>

  <div class="diagonal"></div>

  <div id="habitList"></div>

  <div class="add-btn" onclick="addHabit()">+ ADD</div>

</div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

function requestNotificationPermission() {
  if ("Notification" in window) {
    Notification.requestPermission();
  }
}

function scheduleNotification(hour, minute, message) {
  const now = new Date();
  const target = new Date();

  target.setHours(hour);
  target.setMinutes(minute);
  target.setSeconds(0);

  if (target < now) target.setDate(target.getDate() + 1);

  setTimeout(() => {
    new Notification(message);
    scheduleNotification(hour, minute, message);
  }, target - now);
}

let habits = JSON.parse(localStorage.getItem("habits") || "[]");
let done = {};
let streak = parseInt(localStorage.getItem("streak") || "0");
let lastDate = localStorage.getItem("lastDate") || "";

function render(){
  const list = document.getElementById("habitList");
  list.innerHTML = "";

  let completed = 0;

  // 未達成を上に
  const sorted = habits.map((h,i)=>({h,i})).sort((a,b)=>{
    return (done[a.i]?1:0)-(done[b.i]?1:0);
  });

  sorted.forEach(({h,i})=>{
    const isDone = done[i];
    if(isDone) completed++;

    const el = document.createElement("div");
    el.className = "habit" + (isDone ? " done" : "");

    el.onclick = ()=>{
      done[i] = !done[i];
      el.classList.add("flash");
      setTimeout(()=>el.classList.remove("flash"),400);
      render();
    };

    el.innerHTML = `
      <div class="habit-left"></div>
      <div class="habit-content">
        <div class="habit-name">${h.name}</div>
        <div class="habit-time">${h.time}</div>
      </div>
    `;

    list.appendChild(el);
  });

  document.getElementById("progressNum").textContent = String(completed).padStart(2,'0');

  checkStreak(completed);
}

function checkStreak(completed){
  const today = new Date().toDateString();

  if(completed === habits.length && habits.length > 0){
    if(lastDate !== today){
      streak++;
      lastDate = today;
    }
  } else {
    if(lastDate !== today) streak = 0;
  }

  localStorage.setItem("streak", streak);
  localStorage.setItem("lastDate", lastDate);

  document.getElementById("streak").textContent = `${String(streak).padStart(2,'0')} DAYS`;
}

function addHabit(){
  const name = prompt("習慣名");
  if(!name) return;

  const time = prompt("時間") || "";

  habits.push({name,time});
  localStorage.setItem("habits", JSON.stringify(habits));
  render();
}

function setToday(){
  const d = new Date();
  const day = d.toLocaleDateString('en-US',{weekday:'short'}).toUpperCase();
  const date = d.toLocaleDateString('en-US',{month:'2-digit',day:'2-digit'});
  document.getElementById("today").textContent = `${day} / ${date}`;
}

window.onload = () => {
  setToday();
  render();
  requestNotificationPermission();
  scheduleNotification(21, 0, "習慣やる時間だよ");
};
</script>

</body>
</html>
