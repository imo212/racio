<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title></title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f2027">

<style>

/* ===== ベース改善（上書き） ===== */
body {
  margin: 0;
  background: linear-gradient(160deg, #0f2027, #203a43, #2c5364);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

/* 既存を活かしつつ上品化 */
.container { max-width: 600px; margin: 0 auto; padding: 12px; }

.header {
  text-align: center;
  color: white;
  margin-bottom: 12px;
}

.header-title { font-size: 16px; opacity: 0.9; }
.header-date { font-size: 12px; opacity: 0.7; }

/* カードをガラス風に上書き */
.racio-card, .habits-card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(10px);
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 10px;
  box-shadow: none;
}

/* ラキオ */
.racio-image {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  object-fit: cover;
  margin: 0 auto 8px;
  display: block;
  border: 1px solid rgba(255,255,255,0.2);
}

.racio-message {
  text-align: center;
  font-size: 13px;
  color: rgba(255,255,255,0.9);
  line-height: 1.6;
}

/* 習慣 */
.habit-item {
  background: rgba(255,255,255,0.04);
  border-radius: 10px;
  transition: transform 0.08s ease, opacity 0.2s;
}

.habit-item.done {
  background: rgba(255,255,255,0.08);
}

.habit-item:active {
  transform: scale(0.98);
}

/* テキスト調整 */
.habit-name { color: white; }
.habit-time { color: rgba(255,255,255,0.6); }

/* ボタン */
.edit-btn {
  border: 1px solid rgba(255,255,255,0.4);
  background: transparent;
}

</style>
</head>

<body>

<div class="container">
  <div class="header">
    <div class="header-title">ラキオの習慣トラッカー</div>
    <div class="header-date" id="today"></div>
  </div>

  <!-- ラキオ（元のまま） -->
  <div class="racio-card">
    <img id="racioImage" class="racio-image" src="" alt="Racio">
    <div class="racio-message" id="racioMessage"></div>
  </div>

  <!-- 習慣 -->
  <div class="habits-card" id="habitsList"></div>

  <!-- 連続 -->
  <div class="racio-card">
    <div class="streak-display" id="streakDisplay">0</div>
    <div class="streak-label">🦚 連続達成日数</div>
    <div class="calendar-grid" id="calendar"></div>
  </div>

  <button class="edit-btn" onclick="openEditModal()">習慣を編集</button>
</div>

<!-- モーダル -->
<div class="modal" id="editModal">
  <div class="modal-content">
    <div class="modal-title">習慣の編集</div>
    <div id="editList"></div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="saveHabits()">保存</button>
      <button class="btn btn-secondary" onclick="closeEditModal()">キャンセル</button>
    </div>
  </div>
</div>

<script>

/* ===== Service Worker ===== */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

/* ===== 通知 ===== */
if ("Notification" in window) {
  Notification.requestPermission();
}

/* ===== ★ここが修正ポイント ===== */

/* ラキオ表示（既存データを使う） */
function updateRacioMessage(level) {
  if (!MESSAGES[level]) return;

  const msg = MESSAGES[level][Math.floor(Math.random() * MESSAGES[level].length)];
  const img = IMAGES[level][Math.floor(Math.random() * IMAGES[level].length)];

  document.getElementById("racioMessage").textContent = msg;
  document.getElementById("racioImage").src = img;
}

/* ===== renderの最後に必ず追加 ===== */
// 例（既存renderの最後に入れる）
/*
updateRacioMessage(level);
*/

/* ↑これが無かったのが今回のバグ原因 */

</script>

</body>
</html>
