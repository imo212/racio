<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title></title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d47a1">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #0d47a1, #1976d2);
}

.container {
  max-width: 420px;
  margin: 40px auto;
  padding: 20px;
}

.card {
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 20px;
}

.header-date {
  text-align: center;
  color: white;
  margin-bottom: 20px;
}

.habit {
  background: white;
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: transform 0.08s;
}

.habit:active {
  transform: scale(0.95);
}

.habit.completed {
  background: #e3f2fd;
}

.check {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 2px solid #1976d2;
}

.habit.completed .check {
  background: #1976d2;
}

.done {
  animation: pop 0.25s ease;
}

@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="header-date" id="today"></div>

    <div class="habit" onclick="onHabitClick(this, 'exercise')">
      運動 💪
      <div class="check"></div>
    </div>

    <div class="habit" onclick="onHabitClick(this, 'study')">
      勉強 📘
      <div class="check"></div>
    </div>

  </div>
</div>

<script>
// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

// 日付
document.getElementById("today").textContent =
  new Date().toLocaleDateString();

function markDone(el) {
  el.classList.add("done");
  setTimeout(() => el.classList.remove("done"), 250);
}

function saveHabit(id) {
  const today = new Date().toDateString();
  localStorage.setItem(id + today, "done");
}

function isDone(id) {
  const today = new Date().toDateString();
  return localStorage.getItem(id + today);
}

function onHabitClick(el, id) {
  markDone(el);
  saveHabit(id);
  el.classList.add("completed");
}

window.onload = () => {
  const ids = ["exercise", "study"];
  document.querySelectorAll(".habit").forEach((el, i) => {
    if (isDone(ids[i])) {
      el.classList.add("completed");
    }
  });
};
</script>

</body>
</html>
