<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>

<style>
:root {
  --bg: #f5f7fb;
  --card: #ffffff;
  --accent: #1a73e8;
  --text: #1f2937;
  --sub: #6b7280;
  --border: #e5e7eb;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
}

.container {
  max-width: 560px;
  margin: 0 auto;
  padding: 16px;
}

.card {
  background: var(--card);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 12px;
  border: 1px solid var(--border);
}

/* ▼ 習慣リスト */
.habit-item {
  display: flex;
  align-items: center;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid var(--border);
  margin-bottom: 8px;
  cursor: pointer;
}

.habit-item.done {
  background: #f0f6ff;
  border-color: var(--accent);
}

.habit-check {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2px solid var(--border);
  margin-right: 12px;
}

.habit-item.done .habit-check {
  background: var(--accent);
  border-color: var(--accent);
}

.habit-content {
  flex: 1;
}

.habit-name {
  font-size: 15px;
  font-weight: 500;
}

.habit-time {
  font-size: 12px;
  color: var(--sub);
  margin-top: 2px;
}

/* ▼ 進捗 */
.progress {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.progress-num {
  font-size: 28px;
  font-weight: 600;
}

.progress-bar {
  height: 6px;
  background: var(--border);
  border-radius: 999px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--accent);
  width: 0%;
}

/* ▼ カレンダー */
.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}

.day {
  aspect-ratio: 1;
  border-radius: 6px;
  background: #eef2f7;
}

.day.done {
  background: var(--accent);
}

/* ▼ ボタン */
.button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: var(--accent);
  color: white;
  font-size: 14px;
}

</style>
</head>

<body>
<div class="container">

  <!-- ▼ 進捗優先表示 -->
  <div class="card">
    <div class="progress">
      <div class="progress-num" id="progressNum">0 / 0</div>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- ▼ 習慣一覧（最優先） -->
  <div class="card" id="habitList"></div>

  <!-- ▼ カレンダー（補助情報） -->
  <div class="card">
    <div class="calendar" id="calendar"></div>
  </div>

  <button class="button">習慣を編集</button>

</div>

<script>
const habits = [
  { name: "水を飲む", time: "朝" },
  { name: "ストレッチ", time: "夜" }
];

let done = {};

function render() {
  const list = document.getElementById("habitList");
  list.innerHTML = "";

  let completed = 0;

  habits.forEach((h, i) => {
    const isDone = done[i];
    if (isDone) completed++;

    const el = document.createElement("div");
    el.className = "habit-item" + (isDone ? " done" : "");
    el.onclick = () => {
      done[i] = !done[i];
      render();
    };

    el.innerHTML = `
      <div class="habit-check"></div>
      <div class="habit-content">
        <div class="habit-name">${h.name}</div>
        <div class="habit-time">${h.time}</div>
      </div>
    `;

    list.appendChild(el);
  });

  // progress
  document.getElementById("progressNum").textContent = `${completed} / ${habits.length}`;
  document.getElementById("progressFill").style.width = `${(completed / habits.length) * 100}%`;
}

render();
</script>

</body>
</html>
