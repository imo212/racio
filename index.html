<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title></title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d47a1">

<style>
:root{
  --bg:#f6f8fb;
  --card:#ffffff;
  --text:#1f2937;
  --sub:#6b7280;
  --border:#e5e7eb;
  --accent:#0d47a1;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--bg);
  color:var(--text);
}

.container{
  max-width:560px;
  margin:0 auto;
  padding:16px;
}

/* ▼ ヘッダー（弱める） */
.header{
  margin-bottom:12px;
}
.header-date{
  font-size:13px;
  color:var(--sub);
}

/* ▼ 進捗（最優先） */
.progress-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px;
  margin-bottom:12px;
}
.progress-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}
.progress-num{
  font-size:26px;
  font-weight:600;
}
.progress-bar{
  height:6px;
  background:var(--border);
  border-radius:999px;
  overflow:hidden;
}
.progress-fill{
  height:100%;
  background:var(--accent);
  width:0%;
}

/* ▼ 習慣リスト（主役） */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:12px;
  margin-bottom:12px;
}

.habit{
  display:flex;
  align-items:center;
  padding:14px;
  border-radius:12px;
  border:1px solid var(--border);
  margin-bottom:8px;
  cursor:pointer;
}

.habit:last-child{margin-bottom:0}

.habit.done{
  background:#eef3ff;
  border-color:var(--accent);
}

.habit-check{
  width:22px;
  height:22px;
  border-radius:50%;
  border:2px solid var(--border);
  margin-right:12px;
}

.habit.done .habit-check{
  background:var(--accent);
  border-color:var(--accent);
}

.habit-content{flex:1}

.habit-name{
  font-size:15px;
  font-weight:500;
}

.habit-time{
  font-size:12px;
  color:var(--sub);
  margin-top:2px;
}

</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div class="header-date" id="today"></div>
  </div>

  <!-- ▼ 進捗 -->
  <div class="progress-card">
    <div class="progress-top">
      <div class="progress-num" id="progressNum">0 / 0</div>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- ▼ 習慣一覧 -->
  <div class="card" id="habitList"></div>

</div>

<script>
// ===== Service Worker登録 =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

// ===== 通知許可 =====
function requestNotificationPermission() {
  if ("Notification" in window) {
    Notification.requestPermission();
  }
}

// ===== 指定時間通知 =====
function scheduleNotification(hour, minute, message) {
  const now = new Date();
  const target = new Date();

  target.setHours(hour);
  target.setMinutes(minute);
  target.setSeconds(0);

  if (target < now) {
    target.setDate(target.getDate() + 1);
  }

  const timeout = target - now;

  setTimeout(() => {
    new Notification(message);
    scheduleNotification(hour, minute, message);
  }, timeout);
}

// ===== データ =====
const habits = [
  { name: "水を飲む", time: "朝" },
  { name: "ストレッチ", time: "夜" }
];

let done = {};

// ===== 描画 =====
function render(){
  const list = document.getElementById("habitList");
  list.innerHTML = "";

  let completed = 0;

  habits.forEach((h,i)=>{
    const isDone = done[i];
    if(isDone) completed++;

    const el = document.createElement("div");
    el.className = "habit" + (isDone ? " done" : "");

    el.onclick = ()=>{
      done[i] = !done[i];
      render();
    };

    el.innerHTML = `
      <div class="habit-check"></div>
      <div class="habit-content">
        <div class="habit-name">${h.name}</div>
        <div class="habit-time">${h.time}</div>
      </div>
    `;

    list.appendChild(el);
  });

  document.getElementById("progressNum").textContent = `${completed} / ${habits.length}`;
  document.getElementById("progressFill").style.width = `${(completed / habits.length) * 100}%`;
}

// ===== 日付 =====
function setToday(){
  const d = new Date();
  document.getElementById("today").textContent = d.toLocaleDateString();
}

// ===== 初期化 =====
window.onload = () => {
  setToday();
  render();
  requestNotificationPermission();
  scheduleNotification(21, 0, "習慣やる時間だよ");
};
</script>

</body>
</html>
