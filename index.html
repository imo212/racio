<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title></title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f2027">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: linear-gradient(160deg, #0f2027, #203a43, #2c5364);
  color: #fff;
}

/* レイアウト */
.container {
  max-width: 420px;
  margin: 40px auto;
  padding: 16px;
}

/* カード */
.card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(12px);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 16px;
}

/* ラキオ */
.racio-image {
  width: 100%;
  border-radius: 12px;
  margin-bottom: 12px;
}

.racio-message {
  font-size: 14px;
  line-height: 1.6;
  opacity: 0.9;
}

/* 習慣 */
.habit {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px;
  border-radius: 12px;
  background: rgba(255,255,255,0.04);
  margin-bottom: 8px;
  cursor: pointer;
  transition: transform 0.08s ease, opacity 0.2s;
}

.habit:active {
  transform: scale(0.97);
}

.habit.completed {
  opacity: 0.5;
}

/* 日付 */
.header-date {
  font-size: 14px;
  opacity: 0.7;
  margin-bottom: 12px;
}
</style>
</head>

<body>

<div class="container">

  <div class="header-date" id="today"></div>

  <!-- ラキオ -->
  <div class="card">
    <img id="racioImg" class="racio-image" src="">
    <div id="racioMessage" class="racio-message"></div>
  </div>

  <!-- 習慣 -->
  <div class="card" id="habitList"></div>

</div>

<script>
// ===== Service Worker =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

// ===== 通知 =====
function requestNotificationPermission() {
  if ("Notification" in window) {
    Notification.requestPermission();
  }
}

function scheduleNotification(hour, minute, message) {
  const now = new Date();
  const target = new Date();

  target.setHours(hour);
  target.setMinutes(minute);
  target.setSeconds(0);

  if (target < now) target.setDate(target.getDate() + 1);

  const timeout = target - now;

  setTimeout(() => {
    new Notification(message);
    scheduleNotification(hour, minute, message);
  }, timeout);
}

// ===== データ =====
const habits = [
  { id: "exercise", name: "運動" },
  { id: "study", name: "勉強" },
  { id: "read", name: "読書" }
];

const MESSAGES = {
  low: [
    "……まだ動いてないね。",
    "やる気が出ない日もあるよね。"
  ],
  mid: [
    "いいペースだね。",
    "ちゃんと積み上げてる。"
  ],
  high: [
    "すごいね。ここまで続けてる。",
    "その調子、支えたいな。"
  ]
};

const IMAGES = [
  "https://via.placeholder.com/400x250?text=Racio1",
  "https://via.placeholder.com/400x250?text=Racio2"
];

// ===== 日付 =====
function setToday() {
  const d = new Date();
  document.getElementById("today").textContent =
    d.toLocaleDateString("ja-JP");
}

// ===== ラキオ更新 =====
function updateRacio(level) {
  const msgList = MESSAGES[level];
  const msg = msgList[Math.floor(Math.random() * msgList.length)];

  const img = IMAGES[Math.floor(Math.random() * IMAGES.length)];

  document.getElementById("racioMessage").textContent = msg;
  document.getElementById("racioImg").src = img;
}

// ===== 保存 =====
function toggleHabit(id) {
  const today = new Date().toDateString();
  const data = JSON.parse(localStorage.getItem("habits") || "{}");

  if (!data[today]) data[today] = {};

  data[today][id] = !data[today][id];

  localStorage.setItem("habits", JSON.stringify(data));
  render();
}

// ===== レンダー =====
function render() {
  const list = document.getElementById("habitList");
  list.innerHTML = "";

  const today = new Date().toDateString();
  const data = JSON.parse(localStorage.getItem("habits") || {});
  const todayData = data[today] || {};

  let doneCount = 0;

  habits.forEach(h => {
    const done = todayData[h.id];
    if (done) doneCount++;

    const div = document.createElement("div");
    div.className = "habit" + (done ? " completed" : "");
    div.textContent = h.name;

    div.onclick = () => toggleHabit(h.id);

    list.appendChild(div);
  });

  // レベル判定
  let level = "low";
  if (doneCount >= 2) level = "mid";
  if (doneCount === habits.length) level = "high";

  updateRacio(level);
}

// ===== 初期化 =====
window.onload = () => {
  setToday();
  render();
  requestNotificationPermission();
  scheduleNotification(21, 0, "習慣やる時間だよ");
};
</script>

</body>
</html>
